name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upload to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          api.upload_folder(
              folder_path=".",
              repo_id="bilalhaider-ds/cricket-oracle-api",
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              ignore_patterns=[
                  ".git*",
                  ".github*",
                  "__pycache__",
                  "*.pyc",
                  "node_modules",
                  "dist",
                  "build",
                  "venv",
                  ".venv",
                  "*.db",
                  ".env",
                  ".env.*",
              ],
          )
          print("Upload complete.")
          EOF
